<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/styles.css">
    <script defer src="script/script.js"></script>

    <title>Jungle Memory</title>
</head>

<body>

    <main class="app">

        <div class="header">
            <h1>Jungle Memory</h1>
            <p class="subtitle">Find all matching jungle pairs</p>
            <button class="gameStarter">Start</button>
        </div>

        <div class="gameHeader">
            <h1>Jungle Memory</h1>
            <p class="subtitle">Find all matching jungle pairs</p>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Moves</div>
                    <div class="stat-value stat-value__moves">0</div>
                </div>

                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value stat-value__time">0</div>
                </div>

                <div class="stat">
                    <div class="stat-label">Matches</div>
                    <div class="stat-value stat-value__matches">0</div>
                </div>
            </div>
        </div>


        <div class="game">

            <div class="card" data-symbol="🍕"><div class="up">?</div><div class="down">🍕</div></div>
            <div class="card" data-symbol="🍕"><div class="up">?</div><div class="down">🍕</div></div>

            <div class="card" data-symbol="🍔"><div class="up">?</div><div class="down">🍔</div></div>
            <div class="card" data-symbol="🍔"><div class="up">?</div><div class="down">🍔</div></div>

            <div class="card" data-symbol="🍟"><div class="up">?</div><div class="down">🍟</div></div>
            <div class="card" data-symbol="🍟"><div class="up">?</div><div class="down">🍟</div></div>

            <div class="card" data-symbol="🌮"><div class="up">?</div><div class="down">🌮</div></div>
            <div class="card" data-symbol="🌮"><div class="up">?</div><div class="down">🌮</div></div>

            <div class="card" data-symbol="🍩"><div class="up">?</div><div class="down">🍩</div></div>
            <div class="card" data-symbol="🍩"><div class="up">?</div><div class="down">🍩</div></div>

            <div class="card" data-symbol="🍉"><div class="up">?</div><div class="down">🍉</div></div>
            <div class="card" data-symbol="🍉"><div class="up">?</div><div class="down">🍉</div></div>

            <div class="card" data-symbol="🍓"><div class="up">?</div><div class="down">🍓</div></div>
            <div class="card" data-symbol="🍓"><div class="up">?</div><div class="down">🍓</div></div>

            <div class="card" data-symbol="🍪"><div class="up">?</div><div class="down">🍪</div></div>
            <div class="card" data-symbol="🍪"><div class="up">?</div><div class="down">🍪</div></div>

        </div>

    </main>

</body>
</html>
